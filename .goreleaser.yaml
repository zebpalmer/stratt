# GoReleaser config for stratt.
#
# https://goreleaser.com/
#
# Triggered by .github/workflows/release.yml on tag push.
#
# Builds darwin/linux × arm64/amd64 (R1.6), produces release archives + a
# Homebrew formula in zebpalmer/homebrew-tap.  Artifact attestations are
# produced by the workflow itself (actions/attest-build-provenance), not by
# GoReleaser, so they're not configured here.
version: 2

project_name: stratt

before:
  hooks:
    - go mod tidy

builds:
  - id: stratt
    main: ./cmd/stratt
    binary: stratt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

archives:
  - id: stratt
    formats: [tar.gz]
    name_template: "stratt_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Homebrew tap publishing — disabled for the initial release.
#
# To enable:
#   1. Create the tap repo:  github.com/zebpalmer/homebrew-tap
#   2. Add HOMEBREW_TAP_TOKEN as a repo secret (fine-grained PAT with
#      Contents: read+write on zebpalmer/homebrew-tap)
#   3. Uncomment the brews: block below
#
# brews:
#   - name: stratt
