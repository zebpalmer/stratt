# Driven by .github/workflows/release.yml.  Sigstore attestations are
# produced by the workflow's actions/attest-build-provenance step,
# not here.
version: 2

project_name: stratt

before:
  hooks:
    - go mod tidy

builds:
  - id: stratt
    main: ./cmd/stratt
    binary: stratt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

archives:
  - id: stratt
    formats: [tar.gz]
    name_template: "stratt_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Homebrew tap publishing.
#
# Requires:
#   - github.com/zebpalmer/homebrew-tap to exist
#   - HOMEBREW_TAP_TOKEN secret on this repo (fine-grained PAT with
#     Contents: read+write on zebpalmer/homebrew-tap)
brews:
  - name: stratt
    repository:
      owner: zebpalmer
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://stratt.sh"
    description: "A polyglot task runner that replaces Makefiles, manages release versions, and handles Kustomize image bumps."
    license: Apache-2.0
    test: |
      system "#{bin}/stratt version"
    install: |
      bin.install "stratt"
