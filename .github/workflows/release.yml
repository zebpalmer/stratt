# Triggered by pushing a semver tag.  GoReleaser builds the cross-
# platform archives, publishes the GitHub Release, and pushes the
# Homebrew formula to zebpalmer/homebrew-tap.  Each binary gets a
# Sigstore artifact attestation — the trust anchor `stratt self update`
# verifies against.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # OIDC for sigstore keyless signing
  attestations: write   # publish GitHub artifact attestations

# Opt in to Node 24 for JS actions ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # needed for changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with Contents: read+write on zebpalmer/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Attest release binaries
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/stratt_*"
